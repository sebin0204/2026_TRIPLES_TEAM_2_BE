name: Deploy to EC2

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    # ✅ 빌드가 성공했을 때만 배포 실행
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/2026_TRIPLES_TEAM_2_BE
            
            # ✅ docker-compose.yml 등 설정 파일만 업데이트 
            # (만약 git을 꼭 써야 한다면 유지하되, 소스 빌드는 안 함)
            git pull origin main
            
            # AWS ECR 로그인
            aws ecr get-login-password --region ap-northeast-2 | \
            docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # ✅ 순서 변경 및 강제(-f) 옵션: 서버 내리고 찌꺼기 완벽 삭제 후 풀
            docker compose down
            docker system prune -a -f
            
            # ECR에서 완성된 이미지 가져오기
            docker compose pull
            
            # ✅ --build 옵션 제거: 서버 부하 방지 및 ECR 이미지 그대로 실행
            docker compose up -d
            
            docker compose ps
